name: CI/CD React/Vite App to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1️⃣ جلب الكود من GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ تثبيت الاعتمادات
      - name: Install dependencies
        run: npm install

      # 4️⃣ بناء المشروع
      - name: Build React/Vite App
        run: npm run build

      # 5️⃣ عرض محتوى dist (للتأكد)
      - name: Show build output
        run: |
          echo "✅ Build completed. Files in dist:"
          ls -la dist/
          echo "Total files: $(find dist/ -type f | wc -l)"

      # 6️⃣ نشر المشروع على السيرفر
      - name: Deploy to Server
        run: |
          echo "📁 Copying files to /www/wwwroot/erpzin/"
          
          # إنشاء المجلد إذا مش موجود
          sudo mkdir -p /www/wwwroot/erpzin
          
          # نسخ كل الملفات (بما فيها المخفية)
          sudo rsync -av --delete dist/ /www/wwwroot/erpzin/
          
          # تأكيد الصلاحيات
          sudo chown -R ubuntu:ubuntu /www/wwwroot/erpzin
          
          echo "✅ Deployment completed. Files in target:"
          ls -la /www/wwwroot/erpzin/

      # 7️⃣ اختبار الموقع (اختياري)
      - name: Test website
        run: |
          curl -I http://76.13.50.208 || echo "Website might need configuration"
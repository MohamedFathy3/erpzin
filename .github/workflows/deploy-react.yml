name: CI/CD React/Vite App to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ جلب الكود من GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ تثبيت الاعتمادات
      - name: Install dependencies
        run: npm install

      # 4️⃣ بناء المشروع
      - name: Build React/Vite App
        run: npm run build

      # 5️⃣ نشر المشروع على السيرفر
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 76.13.50.208
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/*"
          target: "/www/wwwroot/erpzin"
          strip_components: 1
          rm: true  # هذا يقوم بحذف الملفات القديمة (مثل --delete في rsync)
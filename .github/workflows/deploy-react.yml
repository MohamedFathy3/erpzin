name: CI/CD React/Vite App to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1️⃣ جلب الكود من GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ تثبيت الاعتمادات
      - name: Install dependencies
        run: npm install

      # 4️⃣ بناء المشروع
      - name: Build React/Vite App
        run: npm run build

      # 5️⃣ نشر المشروع على السيرفر (بدون Docker)
      - name: Deploy to Server
        run: |
          # نسخ الملفات مباشرة إلى المجلد
          rsync -avz --delete dist/ /www/wwwroot/erpzin/
        shell: bash